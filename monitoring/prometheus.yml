# Prometheus configuration for Rap Lyrics Analyzer monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Rap Analyzer API
  - job_name: 'rap-analyzer-api'
    static_configs:
      - targets: ['rap-analyzer-api:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # System metrics (if node_exporter is added)
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']

  # Redis metrics (if redis_exporter is added)
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:9121']

  # Nginx metrics (if nginx_exporter is added)
  - job_name: 'nginx'
    static_configs:
      - targets: ['localhost:9113']
