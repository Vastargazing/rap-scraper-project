# 🎯 Rap Scraper Project Configuration
# Фаза 4: Интеграция и тестирование

# Application settings
application:
  name: "Rap Scraper Project"
  version: "1.0.0"
  description: "Advanced lyrics analysis system with multiple AI and algorithmic approaches"
  author: "Vastargazing"
  
# Database configuration
database:
  path: "rap_lyrics.db"
  pool_size: 10
  timeout: 30
  backup_enabled: true
  backup_interval: 3600  # seconds
  
# Logging configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_path: "logs/app.log"
  max_file_size: 10485760  # 10MB
  backup_count: 5
  encoding: "utf-8"
  console_output: true

# Analyzer configurations
analyzers:
  algorithmic_basic:
    enabled: true
    config:
      sentiment_threshold: 0.5
      complexity_weights:
        vocabulary: 0.3
        structure: 0.3
        themes: 0.4
      
  gemma:
    enabled: true
    config:
      model: "gemma-2-27b-it"
      api_key_env: "GOOGLE_API_KEY"
      temperature: 0.3
      max_tokens: 1000
      timeout: 30
      retry_attempts: 3
      
  ollama:
    enabled: true
    config:
      model: "llama3.1:8b"
      base_url: "http://localhost:11434"
      timeout: 60
      temperature: 0.3
      max_tokens: 1000
      
  hybrid:
    enabled: true
    config:
      algorithms:
        - "algorithmic_basic"
        - "gemma"
      consensus_threshold: 0.7
      fallback_analyzer: "algorithmic_basic"

# CLI settings
cli:
  batch_processing:
    default_workers: 4
    max_workers: 8
    chunk_size: 100
    progress_interval: 5.0
    checkpoint_enabled: true
    
  performance_monitoring:
    monitoring_interval: 0.1
    warmup_runs: 3
    memory_tracking: true
    cpu_tracking: true
    
  output:
    default_format: "json"
    timestamp_format: "%Y-%m-%d %H:%M:%S"
    encoding: "utf-8"

# Performance settings
performance:
  async_concurrency: 10
  request_timeout: 30
  retry_attempts: 3
  retry_delay: 1.0
  
# Security settings
security:
  api_key_validation: true
  rate_limiting:
    enabled: true
    requests_per_minute: 60
  input_validation:
    max_text_length: 100000
    forbidden_patterns: []

# Development settings
development:
  debug_mode: false
  profiling_enabled: false
  test_mode: false
  mock_external_apis: false
  
# Production settings
production:
  error_reporting: true
  metrics_collection: true
  health_check_interval: 300
  auto_scaling: false

# External services
external_services:
  google_ai:
    endpoint: "https://generativelanguage.googleapis.com"
    version: "v1beta"
    
  ollama:
    endpoint: "http://localhost:11434"
    health_check: "/api/version"
    
  genius_api:
    endpoint: "https://api.genius.com"
    version: "v1"
