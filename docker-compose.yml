# 🐳 Docker Compose для Rap Scraper Project
# Включает основное приложение и дополнительные сервисы

version: '3.8'

services:
  # Основное приложение
  rap-scraper:
    build: .
    image: rap-scraper:latest
    container_name: rap-scraper-app
    environment:
      - ENVIRONMENT=production
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - PYTHONPATH=/app/src
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./results:/app/results
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      - ollama
    networks:
      - rap-scraper-network

  # Ollama для локального AI
  ollama:
    image: ollama/ollama:latest
    container_name: rap-scraper-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    networks:
      - rap-scraper-network

  # Nginx для reverse proxy (опционально)
  nginx:
    image: nginx:alpine
    container_name: rap-scraper-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - rap-scraper
    restart: unless-stopped
    networks:
      - rap-scraper-network

  # Monitoring с Prometheus (опционально)
  prometheus:
    image: prom/prometheus:latest
    container_name: rap-scraper-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - rap-scraper-network

  # Grafana для визуализации (опционально)
  grafana:
    image: grafana/grafana:latest
    container_name: rap-scraper-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - rap-scraper-network

volumes:
  ollama_data:
  prometheus_data:
  grafana_data:

networks:
  rap-scraper-network:
    driver: bridge
